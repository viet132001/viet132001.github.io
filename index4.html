    <div id="map"></div>

    <div class="map-controls" style="position: absolute; top: 10px; left: 10px; z-index: 1000;">
        <select id="basemap-select" onchange="changeBasemap(this.value)"
            style="padding: 8px 12px; border-radius: 6px; border: 1px solid #ccc; background: white; cursor: pointer; font-size: 13px; font-weight: 500; outline: none; color: #333;">
            <option value="google-road" selected>Bản đồ Google</option>
            <option value="google-satellite">Vệ tinh Google</option>
            <option value="carto-light">Bản đồ sáng (CartoDB)</option>
            <option value="osm">Tiêu chuẩn (OSM)</option>
        </select>
    </div>



    <script>
        var lo = document.location.toString();
        var url = new URL(lo)
        var parent_code = url.searchParams.get('parent_code');
        var viewMap = url.searchParams.get('viewMap');
        var dataSale = [];
        var online = 0;
        var offline = 0; 
        var lat = 10.760948// url.searchParams.get('lat');10.760948, 106.705611
        var long = 106.705611//url.searchParams.get('long');
        try{
            lat = url.searchParams.get('lat');
         long = url.searchParams.get('long');
         console.log(lat,long)
        }catch (e){
            log(lat,long)
        }
        if(lat==null || lat.toString()=='null' || lat.toString() == 'undefined'){
            console.log('co zô đây ko')
         lat = 10.760948;
         long = 106.705611;
        }
        const basemaps = {
            'google-road': 'https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',
            'google-satellite': 'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
            'carto-light': 'https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
            'osm': 'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
        };
        var first = true;
        var visited = 0;
        var notVisited = 0;
        var order = 0;
        let popup = null;
        var map = new maplibregl.Map({
            container: 'map',
            center: [long, lat],
            zoom: 10,
            style: {
                version: 8,
                glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
                sources: {
                    'raster-tiles': {
                        type: 'raster',
                        tiles: [basemaps['google-road']],
                        tileSize: 256,
                        attribution: '© Google'
                    }
                },
                layers: [{
                    id: 'simple-tiles',
                    type: 'raster',
                    source: 'raster-tiles',
                    minzoom: 0,
                    maxzoom: 22
                }]
            }
        });

        function changeBasemap(type) {
            const tileUrl = basemaps[type];
            if (!tileUrl || !map) return;

            if (map.getLayer('simple-tiles')) {
                map.removeLayer('simple-tiles');
            }
            if (map.getSource('raster-tiles')) {
                map.removeSource('raster-tiles');
            }

            let attribution = '© OpenStreetMap';
            if (type.startsWith('carto')) {
                attribution = '© CartoDB, © OpenStreetMap';
            } else if (type.startsWith('google')) {
                attribution = '© Google';
            }

            map.addSource('raster-tiles', {
                type: 'raster',
                tiles: [tileUrl],
                tileSize: 256,
                attribution: attribution
            });

            const layers = map.getStyle().layers;
            let beforeId = undefined;
            if (layers && layers.length > 0) {
                const firstNonTileLayer = layers.find(l => l.id !== 'simple-tiles');
                if (firstNonTileLayer) {
                    beforeId = firstNonTileLayer.id;
                }
            }

            map.addLayer({
                id: 'simple-tiles',
                type: 'raster',
                source: 'raster-tiles',
                minzoom: 0,
                maxzoom: 22
            }, beforeId);
        }

                                    center: [data.data[0]['shop_long'], data.data[0]['shop_lat']],
                                    speed: 1,
                                    zoom: 14,
                                    easing(t) {
                                        if (t == 1) {
                                            map.setPitch(30);
                                            endFly = 1;
                                        }
                                        return t;
                                    }
                                });
                            }
                        }
                        data.data.forEach((element, i) => {
                            // if (element['status'] == "CHECKOUT") {
                            //     visited += 1;
                            //     infoPlan.querySelector('tr:nth-child(2) td').textContent = 'Đã viếng thăm : ' + visited;
                            // } else {
                            //     notVisited += 1;
                            //     infoPlan.querySelector('tr:nth-child(3) td').textContent = 'Chưa viếng thăm : ' + notVisited;
                            // }

                            var imgs = '';

                            const sourceId = `${element['shop_code']}`;

                            // Kiểm tra xem source đã tồn tại hay chưa
                            const existingSource = map.getSource(sourceId);
                            const existingLayer = map.getLayer(sourceId);
                            if (existingSource) {
                                // Source đã tồn tại

                                // Source đã tồn tại, thực hiện cập nhật dữ liệu cho source
                                var imgs = '';
                                element['images']?.forEach((e, j) => {

                                    var url = `https://media-daithuan.newweb.vn/file/${e['id']}`;
                                    console.log(url)
                                    imgs += `<img src="${url}" style="width: 100px;height: 100px;"/> `

                                })
                                map.getSource(sourceId).setData({
                                    'type': 'FeatureCollection',
                                    'features': [
                                        {
                                            'type': 'Feature',
                                            'properties': {
                                                'title': 'vtmapgl',
                                                'icon': 'theatre',
                                                'description': '<strong>' + element['shop_name'] + '</strong>' + '<Br/>' + imgs + '<Br/>' + ' Trạng thái :' + '<strong>' + element['status'] + '</strong>'
                                            },
                                            'geometry': {
                                                'type': 'Point',
                                                'coordinates': [element['shop_long'], element['shop_lat']],
                                            },
                                        }
                                    ]
                                });

                            } else {
                                // Source chưa tồn tại
                                var imgs = '';
                                if (element['images']) {
                                    element['images'].forEach((e, j) => {

                                        var url = `https://media-daithuan.newweb.vn/file/${e['id']}`;
                                        console.log(url)
                                        imgs += `<img src="${url}" style="width: 100px;height: 100px;"/> `

                                    })
                                }
                                map.addSource(`${sourceId}`, {
                                    'type': 'geojson',
                                    'data': {
                                        'type': 'FeatureCollection',
                                        'features': [
                                            {
                                                'type': 'Feature',
                                                'properties': {
                                                    'title': 'vtmapgl',
                                                    'icon': 'theatre',
                                                    'description': '<strong>' + element['shop_name'] + '</strong>' + '<Br/>' + imgs + '<Br/>' + ' Trạng thái :' + '<strong>' + element['status'] + '</strong>'
                                                },
                                                'geometry': {
                                                    'type': 'Point',
                                                    'coordinates': [element['shop_long'], element['shop_lat']],
                                                },
                                            }
                                        ]
                                    }
                                });
                            }



                            // Kiểm tra xem layer đã tồn tại hay chưa


                            if (existingLayer) {
                                // Layer đã tồn tại

                                //  map.getLayer(sourceId).setData
                            } else {
                                // Layer chưa tồn tại
                                if (map.getSource(sourceId)) {

                                    map.addLayer({
                                        'id': `${sourceId}`,
                                        'type': 'symbol',
                                        'source': `${sourceId}`,
                                        'layout': {
                                            'icon-image': `logo`,
                                            'icon-size': 0.3,
                                            'icon-optional': true,
                                            'icon-allow-overlap': true,
                                            'text-allow-overlap': true,
                                            'text-field': `${element['shop_name']}`, // `${element['is_parent'] == 1 ? 'Giám sát' : 'sale'} ${element['name']}`,
                                            'text-offset': [0, 2],
                                            'text-anchor': 'top',
                                            'text-size': 5,
                                            'text-max-width': 10,
                                            'text-line-height': 1.2,
                                        },
                                        'paint': {
                                            // ...các thuộc tính paint khác
                                            'text-color': `${element['status'] == 'NEW' ? '#DF5E36' : element['status'] == 'CHECKIN' ? '#23EDED' : element['status'] == 'CHECKOUT' ? '#96E14A' : '#FA0B0B'}`,
                                            'text-halo-color': '#fff',
                                            'text-halo-width': 2,
                                        },
                                    });
                                }
                            }


                            map.on('click', `${sourceId}`, (e) => {
                                // Xử lý sự kiện khi click vào marker
                                // Copy coordinates array.
                                const coordinates = e.features[0].geometry.coordinates.slice();
                                const description = e.features[0].properties.description;

                                // Ensure that if the map is zoomed out such that multiple
                                // copies of the feature are visible, the popup appears
                                // over the copy being pointed to.
                                while (Math.abs(e.lngLat.lng - coordinates[0]) > 180) {
                                    coordinates[0] += e.lngLat.lng > coordinates[0] ? 360 : -360;
                                }
                                if (popup) {
                                    popup.remove(); // Ẩn popup nếu đã tồn tại
                                }

                                new maplibregl.Popup()
                                    .setLngLat(coordinates)
                                    .setHTML(description)
                                    .addTo(map);
                                const closeButton = popup._content.querySelector('.mapboxgl-popup-close-button');
                                closeButton.addEventListener('click', () => {
                                    popup.remove(); // Đóng popup khi click vào X
                                });
                            });

                        });
                    },
                    error: function (error) {
                        // console.log(error);
                    }
                });
            }

        }
        function setTimeoutDataPlan() {
            setTimeout(getDataPlan, 60000 * 10);
        }

        //  $("div#info").html("<p>All new content. <em>You bet!</em></p>");

    </script>
    <button id="btnGetData">Gọi API</button>
    <div id="output"></div>

</body>
